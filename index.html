        /*Для узких экранов*/
@media(max-width: 480px){
    html{
        max-width: 100%;
        max-height: 100%;
        overflow-x: hidden;
    }
    /*Body*/
    body{
        background-color: azure;
        margin: 0 auto;
        max-width: 100%;
        min-width: 100%;
        overflow-x: hidden;
    }
    #essay{
        white-space: pre-line;
        position: relative;
        word-wrap: normal;
    }
    #content{
        width: 100%;
        margin-top: -15px;
    }
    /*Header*/
    header{
        background-size: auto 70%;
        padding-top: 20px;
        padding-bottom: 20px;
        background-repeat: repeat-x;
        background-color: #fff;
        width: 100%;
    }
    #main{
        text-shadow: rgb(255, 255, 255) 0 0 5px;
        white-space: pre;
        font-size: 40px;
        font-family:Georgia, 'Times New Roman', Times, serif;
    }
    #fr{
        border-left: 0px;
    }
    .choosen{
        color: rgb(149, 148, 148);
        border-left-color: black;
    }
    p{
        float: left;
        width: 18.5%;
        margin-top: -10px;
        font-style: italic;
        font-size: 14px;
        border-left: 10px;
        border-color: black;
        border-left: solid;
    }
    /*Footer*/
    footer{
        width: 100%;
        padding-top: 10px;
        padding-bottom: 15px;
        background-color: rgb(151, 150, 150);
        color: #000000;
        text-shadow: rgb(255, 255, 255) 0 0 5px;

    }
    .icons{
        width: 40px;
        margin-left: 20px;
        margin-right: 20px;
        filter: drop-shadow(7px 7px 7px rgba(255, 255, 255, 0.5));
    }
    /**/
    label{
        width:40px;
        height:20px;
        position: relative;
        display: block;
        background: #ebebeb;
        border-radius: 200px;
        box-shadow: inset 0px 5px 15px rgba(0,0,0,0.4), inset 0px -5px 15px rgba(255,255,255,0.4);
        cursor: pointer;
    }
    label:after{
        content: "";
        width:18px;
        height: 18px;
        position: fixed;
        top:10px;
        left:10px;
        background: linear-gradient(180deg,#ffcc89,#d8860b);
        border-radius: 18px;
        box-shadow: 0px 5px 10px rgba(0,0,0,0.2);
    }
    input{
        width: 0;
        height: 0;
        visibility: hidden;
    }
    input:checked + label{
        background: #242424;
    }
    input:checked + label:after{
        left:49px;
        transform: translateX(-100%);
        background: linear-gradient(180deg,#777,#3a3a3a);
    }
    label, label:after{
        transition: 0.3s
    }
    #switchThemeWindow{
        width: 5%;
        height: auto;
        z-index: 9997;
        position: fixed;
        top: -10.5px;
        left: 9.8px;
    }
    .black{
        background-color: #242424;
        color: white;
        border-color: white;
    }
}
