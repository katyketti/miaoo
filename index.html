        /* toggle */
    #toggle_checkbox
    {
        display: none;
    }

    label
    {
        display: block;
        position: absolute;
        top: 50%;
        right: 0;
        left: 0;
        width: 116px;
        height: 56px;
        margin: 0 auto;
        background-color: #77b5fe;
        border-radius: 56px;
        transform: translateY(-50%);

        overflow: hidden;

    #star
    {
        position: absolute;
        top: 13px;
        left: 13px;
        width: 30px;
        height: 30px;
        background-color: #fafd0f;
        transform: scale(1);
        border-radius: 50%;
        transition: 0.3s ease top, 0.3s ease left, 0.3s ease transform, 0.3s ease background-color;
        z-index: 1;
    }

    #star-1
    {
        position: relative;
    }

    #star-2
    {
        position: absolute;
        transform: rotateZ(36deg);
    }

    .star
    {
        top: 0;
        left: -7px;
        font-size: 54px;
        line-height: 28px;
        color: #fafd0f;
        transition: 0.3s ease color;
    }

    #moon
    {
        position: absolute;
        bottom: -52px;
        right: 8px;
        width: 40px;
        height: 40px;
        background-color: #fff;
        border-radius: 50%;
        transition: 0.3s ease bottom;
    }

    #moon:before
    {
        content: "";
        position: absolute;
        top: -12px;
        left: -17px;
        width: 40px;
        height: 40px;
        background-color:#03a9f4;
        border-radius: 50%;
        transition: 0.3s ease background-color;
    }

    #toggle_checkbox:checked + label
    {
        background-color: #000;
    }

    #toggle_checkbox:checked + label #star

        left: 64px;
        transform: scale(0.3);

    }

    #toggle_checkbox:checked + label .star
    {
        color: yellow;
    }

    #toggle_checkbox:checked + label #moon
    {
        bottom: 8px;
    }

    #toggle_checkbox:checked + label #moon:before

    }

// Дальше скрипт
const mainText = document.querySelector(".main h1")
const toggle = document.getElementById('toggle_checkbox')

document.querySelector("header").classList.add("no-bg");

const keys = ["  А  Я  E  ", "К            ", "  А          ", "    Т        ", "      Я      ", "        K    ", "         E  ", "           T", "КАТЯКЕТ", "КАТЯКЕТ"]
const essay = {
    russian: r,
    english: e,
    japanese: j,
    spanish: s,
    french: f
}

document.querySelector("#essay").textContent = essay.russian;

let language;
let item = 0;
let theme = 'day';

//start animation
async function start() {
    for (let i = 0; i < keys.length; i++) {
        await new Promise(resolve => setTimeout(resolve, 300));
        if(theme == "night"){
            item = keys.length - 1;
            mainText.textContent = keys[item]
            i = keys.length;
        }
        mainText.textContent = keys[item];
        item++;
        if (item == keys.length && theme == "day")
        {
            document.querySelector("header").classList.remove("no-bg");
        }
    }
}
start();

//event listeners
toggle.addEventListener("click", function(){
    if(theme == "day"){
        theme = 'night';
        document.querySelectorAll("*").forEach(el => el.classList.add("black"))
    }else if(theme == "night"){
        theme = 'day';
        document.querySelectorAll("*").forEach(el => el.classList.remove("black"))
    }
});

document.querySelectorAll("header .paragraphs p").forEach((p, index) => {
    p.addEventListener("click", function () {
        let prevI = 0;
        document.querySelectorAll(".paragraphs p").forEach((par, i) => {if (par.classList.contains("choosen")) { par.classList.remove("choosen"); prevI = i; }})
        p.classList.add("choosen");
        language = p.dataset.lang;
        if (prevI == index) return;  
        essayAnimation(prevI > index? true : false);
    })
})

async function essayAnimation(right, speed = 60, distance = 1500) {
    document.querySelector("#essay").style.left = 'unset';
    let pos = -distance;
    if (right) { document.querySelector("#essay").style.right = `${-distance}px`; }
    else { document.querySelector("#essay").style.left = `${distance}px`; }
    document.querySelector("#essay").textContent = essay[language];
    for (let i = 0; i < distance / speed + 1; i++) {
        await new Promise(resolve => setTimeout(resolve, 20));
        if (right) { document.querySelector("#essay").style.right = pos + 'px'; }
        else { document.querySelector("#essay").style.left = pos + 'px'; }
        pos += speed;
    }
}
